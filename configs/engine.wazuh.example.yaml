# trace-engine × Wazuh MCP 生产验证配置
# 1) 换 Token: python scripts/wazuh_auth.py --api-key wazuh_xxx
# 2) copy configs/engine.wazuh.example.yaml configs/engine.yaml
# 3) python scripts/serve_engine.py --config configs/engine.yaml
#
# 环境变量（推荐，勿把 JWT 写进 yaml）:
#   WAZUH_MCP_TOKEN
#   TRACE_ENGINE_MCP_ENDPOINT=http://192.144.151.189/mcp
#   TRACE_ENGINE_BACKEND=soar_mcp

backend: soar_mcp

soar_mcp:
  endpoint: "https://192.144.151.189/mcp"
  verify_tls: true
  ca_bundle: "mcp-ca.crt"
  tool_profile: "wazuh"
  tool_name: "search_security_events"
  headers: {}
  timeout_seconds: 45
  max_retries: 3
  page_limit: 50
  lookback_seconds: 2592000
  lookahead_seconds: 0
  allowed_clock_skew_seconds: 300
  wazuh_time_range: "30d"
  wazuh_compact: false
  # 场景入库后填场景 ID（→ data.scenario:pipeline_18）或 INC- 事件号
  wazuh_incident_prefix: ""
  wazuh_scope_field: "auto"
  wazuh_attacks_only: false
  operator_datasource_map:
    process_tree: "EDR"
    script_execution: "EDR"
    persistence_scan: "EDR"
    network_flow: "NDR"
    auth_log: "SIEM"
    lateral_movement_check: "SIEM"
  query_template: "host:{host}"

  # 资产发现（bootstrap 阶段补充 known_hosts，供跨主机探针使用）
  asset_inventory:
    wazuh_agents_enabled: true
    wazuh_agents_tool: "get_wazuh_agents"   # 仅在线: get_wazuh_running_agents
    wazuh_agents_status: ""                  # 可选 active / disconnected
    wazuh_agents_limit: 500
    cmdb:
      enabled: false
      url: ""                                # 例: https://cmdb.corp/api/v1/hosts
      hosts_json_path: "data.items"          # 响应里主机数组的点分路径
      hostname_field: "hostname"             # 每条记录的主机名字段
      headers: {}                            # 例: { Authorization: "Bearer xxx" }

normalizer:
  field_map:
    ref: "raw_log_ref"
    timestamp: "timestamp"
    technique: "mitre_technique"       # _flatten_wazuh_alert 顶层键
    tactic: "mitre_tactic"             # _flatten_wazuh_alert 顶层键（MCP 层推导）
    action: "action"
    anomaly_score: "anomaly_score"
    host: "host"                       # _flatten_wazuh_alert 保证顶层 host 字段
    host_fallback: "agent_name"
    process_name: "src_process"

budget:
  total_rounds: 50
  total_probes: 400
  fanout_per_round: 8

model_planner:
  mode: "shadow"
  provider: "deepseek"
  model: "deepseek-v4-flash"
  endpoint: "https://api.deepseek.com/v1"
  credential_env: "DEEPSEEK_API_KEY"
  verify_tls: true
  max_intents_per_round: 4
  cost_budget_per_round: 1.0
  max_graph_nodes: 40

model_judgement:
  mode: "assist"
  provider: "deepseek"
  model: "deepseek-v4-flash"
  endpoint: "https://api.deepseek.com/v1"
  credential_env: "DEEPSEEK_API_KEY"
  verify_tls: true
  max_calls_per_round: 3
  max_calls_per_case: 20
  max_tokens_per_case: 20000
  max_context_nodes: 40
  ambiguity_margin: 0.35

model_mcp_compiler:
  mode: "shadow"
  provider: "deepseek"
  model: "deepseek-v4-flash"
  endpoint: "https://api.deepseek.com/v1"
  credential_env: "DEEPSEEK_API_KEY"
  verify_tls: true
  max_plans_per_round: 4
  max_calls_per_round: 3
  max_calls_per_case: 30
  max_tokens_per_case: 20000
  max_context_nodes: 40
  max_time_range_days: 30
  max_filters: 4
  fallback_to_template: true

service:
  host: "0.0.0.0"
  port: 8100
  api_keys: []
  db_path: "data/trace_engine.db"
  audit_log_path: "data/audit.log"
