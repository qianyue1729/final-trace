# Wazuh MCP production demo profile — explicit opt-in only.
# Enable via TRACE_ENGINE_DEMO_PROFILE=1 or TRACE_ENGINE_CONFIG=configs/engine_demo_wazuh.yaml
# Does NOT use data.is_attack:true; guardrails downgrade config gaps to warnings.

backend: soar_mcp

demo_profile:
  enabled: true
  plateau_rounds: 5
  min_graph_nodes: 8
  min_graph_edges: 6
  diversity_per_rule_id_cap: 20
  candidate_top_k: 50
  guardrail_downgrade: true

soar_mcp:
  endpoint: "https://192.144.151.189/mcp"
  verify_tls: false
  ca_bundle: ""
  tool_profile: "wazuh"
  tool_name: "search_security_events"
  headers: {}
  timeout_seconds: 45
  max_retries: 3
  page_limit: 50
  lookback_seconds: 2592000
  lookahead_seconds: 0
  allowed_clock_skew_seconds: 300
  wazuh_time_range: "30d"
  wazuh_compact: false
  wazuh_incident_prefix: ""
  wazuh_scope_field: "auto"
  wazuh_attacks_only: false
  operator_datasource_map:
    process_tree: "EDR"
    script_execution: "EDR"
    persistence_scan: "EDR"
    network_flow: "NDR"
    auth_log: "SIEM"
    lateral_movement_check: "SIEM"
  query_template: "host:{host}"

  asset_inventory:
    wazuh_agents_enabled: true
    wazuh_agents_tool: "get_wazuh_agents"
    wazuh_agents_limit: 500
    cmdb:
      enabled: false
      url: ""
      hosts_json_path: "data.items"
      hostname_field: "hostname"

normalizer:
  field_map:
    ref: "raw_log_ref"
    timestamp: "timestamp"
    technique: "mitre_technique"
    tactic: "mitre_tactic"
    action: "action"
    anomaly_score: "anomaly_score"
    host: "hostname"
    host_fallback: "agent_name"
    process_name: "src_process"

budget:
  total_rounds: 50
  total_probes: 400
  fanout_per_round: 8

service:
  host: "0.0.0.0"
  port: 8100
  api_keys: []
  db_path: "data/trace_engine.db"
  audit_log_path: "data/audit.log"
