# trace-engine × Wazuh MCP（由 engine.wazuh.example.yaml 生成）
# Token 从 host-client.env 或 WAZUH_MCP_TOKEN 环境变量注入，勿写入本文件。

backend: soar_mcp

soar_mcp:
  endpoint: "https://192.144.151.189/mcp"
  verify_tls: false   # 本地代理注入自签名证书，跳过 CA 验证；服务端证书正常
  ca_bundle: ""        # 由 verify_tls=false 控制，_resolve_ca_bundle_path 会跳过解析
  tool_profile: "wazuh"
  tool_name: "search_security_events"
  headers: {}
  timeout_seconds: 45
  max_retries: 3
  page_limit: 50
  lookback_seconds: 2592000
  lookahead_seconds: 0
  allowed_clock_skew_seconds: 300
  wazuh_time_range: "30d"
  wazuh_compact: false
  # 真实调查默认不固定范围；由请求中的 incident/case ID 动态设置。
  wazuh_incident_prefix: ""
  wazuh_scope_field: "auto"
  wazuh_attacks_only: false
  operator_datasource_map:
    process_tree: "EDR"
    script_execution: "EDR"
    persistence_scan: "EDR"
    network_flow: "NDR"
    auth_log: "SIEM"
    lateral_movement_check: "SIEM"
  query_template: "host:{host}"

  asset_inventory:
    wazuh_agents_enabled: true
    wazuh_agents_tool: "get_wazuh_agents"
    wazuh_agents_limit: 500
    cmdb:
      enabled: false
      url: ""
      hosts_json_path: "data.items"
      hostname_field: "hostname"

normalizer:
  field_map:
    ref: "raw_log_ref"
    timestamp: "timestamp"
    technique: "mitre_technique"
    tactic: "mitre_tactic"
    action: "action"
    anomaly_score: "anomaly_score"
    host: "hostname"
    host_fallback: "agent_name"
    process_name: "src_process"

budget:
  total_rounds: 50
  total_probes: 400
  fanout_per_round: 8

service:
  host: "0.0.0.0"
  port: 8100
  api_keys: []
  db_path: "data/trace_engine.db"
  audit_log_path: "data/audit.log"
